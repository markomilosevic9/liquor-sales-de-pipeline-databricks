resources:
  pipelines:

    bronze_pipeline:
      name: bronze_pipeline_${var.env}
      target: bronze
      catalog: ${var.env}
      serverless: true
      continuous: false
      development: false
      channel: current
      configuration:
        source_catalog: ${var.env}
      libraries:
        - notebook:
            path: ../notebooks/02_bronze_auto_loader.ipynb

    silver_pipeline:
      name: silver_pipeline_${var.env}
      target: silver
      catalog: ${var.env}
