      catalog: ${var.env}
      serverless: true
      continuous: false
      development: false
      channel: current
      configuration:
        source_catalog: ${var.env}
      libraries:
        - notebook:
            path: ../notebooks/06_gold_sales_trends.ipynb
        - notebook:
            path: ../notebooks/07_gold_geographic.ipynb
        - notebook:
            path: ../notebooks/08_gold_vendor_category.ipynb
        - notebook:
            path: ../notebooks/09_gold_store_performance.ipynb