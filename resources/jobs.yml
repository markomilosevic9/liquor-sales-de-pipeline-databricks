resources:
  jobs:

    iowa_liquor_daily:
      name: iowa_liquor_daily_${var.env}

      tasks:

        # task 1: api ingestion
        - task_key: ingest_api
          notebook_task:
            notebook_path: ../notebooks/01_ingest_api_to_volume.ipynb
            base_parameters:
              env: ${var.env}
          timeout_seconds: 3600
          max_retries: 1
          min_retry_interval_millis: 60000

        # task 2: bronze dlt pipeline
        - task_key: bronze_pipeline
          depends_on:
            - task_key: ingest_api
          pipeline_task:
            pipeline_id: ${resources.pipelines.bronze_pipeline.id}
          timeout_seconds: 1800

        # task 3: dim_dates (static calendar, run once)
        - task_key: dim_dates
          depends_on:
            - task_key: bronze_pipeline
          notebook_task:
            notebook_path: ../notebooks/03_dim_dates.ipynb
            base_parameters:
              env: ${var.env}
          timeout_seconds: 300

        # task 4: silver pipeline (cleaned_sales only)
        - task_key: silver_pipeline
          depends_on:
            - task_key: dim_dates
          pipeline_task:
            pipeline_id: ${resources.pipelines.silver_pipeline.id}
          timeout_seconds: 1800

        # task 5: manual SCD 2 dimensions + fact load
        - task_key: dims_and_facts
          depends_on:
            - task_key: silver_pipeline
          notebook_task:
            notebook_path: ../notebooks/05_silver_dims_and_facts.ipynb
            base_parameters:
              env: ${var.env}
          timeout_seconds: 1800

        # task 6: gold dlt pipeline (materialized views)
        - task_key: gold_pipeline
          depends_on:
            - task_key: dims_and_facts
          pipeline_task:
            pipeline_id: ${resources.pipelines.gold_pipeline.id}
          timeout_seconds: 1800

        # task 7: delta maintenance
        - task_key: delta_maintenance
          depends_on:
            - task_key: gold_pipeline
          notebook_task:
            notebook_path: ../notebooks/10_delta_maintenance.ipynb
            base_parameters:
              env: ${var.env}
          timeout_seconds: 900

        # task 8: data quality check
        - task_key: quality_check
          depends_on:
            - task_key: delta_maintenance
          notebook_task:
            notebook_path: ../notebooks/11_quality_check.ipynb
            base_parameters:
              env: ${var.env}
          timeout_seconds: 600